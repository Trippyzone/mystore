<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Synthetic Innovations</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
    <h2>Premium Synthetic Innovations</h2>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#products">Products</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div class="overlay">
        <h1>ESD Caps & Synthetic Materials</h1>
        <p>High Quality Industrial Solutions</p>
    </div>
</section>

<section id="products" class="products">
    <h2>Our Products</h2>

    <div class="grid">

        <div class="card">
            <img src="images/esd1.jpg">
            <h3>ESD Cap Blue</h3>
            <button onclick="addToCart('ESD Cap Blue')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/esd2.jpg">
            <h3>ESD Cap White</h3>
            <button onclick="addToCart('ESD Cap White')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/fabric1.jpg">
            <h3>Synthetic Fabric</h3>
            <button onclick="addToCart('Synthetic Fabric')">Add to Cart</button>
        </div>

        <div class="card">
            <img src="images/fabric2.jpg">
            <h3>Industrial Material</h3>
            <button onclick="addToCart('Industrial Material')">Add to Cart</button>
        </div>

    </div>
</section>

<section class="cart">
    <h2>Cart</h2>
    <ul id="cart-items"></ul>
    <button onclick="sendWhatsApp()">Order on WhatsApp</button>
</section>

<section id="contact" class="contact">
    <h2>Contact</h2>
    <p>Email: info@premiumsyntheticinnovations.com</p>
</section>

<script src="script.js"></script>
</body>
  </html>
